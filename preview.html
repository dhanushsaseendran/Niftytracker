<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Nifty 50 Tracker — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--card:#1a1a1a;--card2:#141414;--border:#2a2a2a;
  --green:#00e676;--green-dim:rgba(0,230,118,.15);
  --red:#ff3355;--red-dim:rgba(255,51,85,.15);
  --text:#fff;--muted:#888;--dim:#444;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,sans-serif;overflow:hidden}
button{border:none;background:none;cursor:pointer;font-family:inherit;color:inherit}
input{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ── Shell ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;background:#000}

/* ── Header ── */
#header{
  position:absolute;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,#0d0d0d 85%,rgba(0,0,0,0));
  padding:14px 16px 12px;
}
.hrow1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.sym{font-size:13px;font-weight:700;letter-spacing:.08em;margin-left:8px}
.clock{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.hrow2{display:flex;align-items:flex-end;gap:12px;margin-bottom:12px}
.price{font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
.chg-wrap{display:flex;flex-direction:column;padding-bottom:4px}
.chg{font-size:14px;font-weight:600;line-height:1.2}
.chgpct{font-size:12px;font-weight:600;line-height:1.2}
.hrow3{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.period-btn{display:flex;align-items:center;gap:4px;background:#252525;
  border:1px solid #333;border-radius:8px;padding:4px 10px;
  font-size:12px;font-weight:600;color:#fff;position:relative}
.period-drop{position:absolute;top:110%;left:0;background:#252525;
  border:1px solid #333;border-radius:8px;overflow:hidden;z-index:200;min-width:80px;display:none}
.period-drop.open{display:block}
.period-drop button{display:block;width:100%;text-align:left;padding:8px 12px;
  font-size:12px;font-weight:600;cursor:pointer}
.period-drop button:hover,.period-drop button.active{color:var(--green);background:rgba(0,230,118,.1)}
.ohl{display:flex;align-items:center;gap:4px}
.ohl-l{font-size:11px;color:#555;font-weight:600}
.ohl-v{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}

/* ── Scroll area ── */
#scroll{position:absolute;top:148px;bottom:64px;left:0;right:0;
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:12px 14px 8px}

/* ── Bottom nav ── */
#nav{position:absolute;bottom:0;left:0;right:0;height:64px;
  background:#000;border-top:1px solid #1e1e1e;
  display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;padding:6px 0;min-height:44px}
.nav-btn svg{transition:color .15s}
.nav-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;transition:color .15s}

/* ── Cards ── */
.card{background:var(--card);border-radius:14px;padding:16px;
  border:1px solid var(--border);margin-bottom:12px}
.card:last-child{margin-bottom:0}
.card-hdr{display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700;letter-spacing:.02em}

/* ── Status badge ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em;flex-shrink:0}
.badge.pos{background:var(--green-dim);color:var(--green)}
.badge.neg{background:var(--red-dim);color:var(--red)}

/* ── Signal banner ── */
.sig-banner{border:1.5px solid;border-radius:10px;padding:10px 16px;
  text-align:center;margin-bottom:14px}
.sig-banner span{font-size:20px;font-weight:800;letter-spacing:.1em}

/* ── Mini indicator grid ── */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mini-cell{background:#111;border-radius:10px;padding:10px 12px;border:1px solid #222}
.mini-lbl{font-size:10px;font-weight:700;color:#555;letter-spacing:.06em;margin-bottom:6px}
.mini-row{display:flex;align-items:center;justify-content:space-between}

/* ── Inner rows ── */
.inner-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:#111;border-radius:8px;margin-top:10px}
.inner-lbl{font-size:12px;color:var(--muted);font-weight:600}
.inner-val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.angle-tag{font-size:11px;font-weight:700;color:var(--green);background:rgba(0,230,118,.12);
  padding:2px 8px;border-radius:6px}
.dist{font-size:11px;font-weight:600}
.near-tag{font-size:10px;background:rgba(0,230,118,.12);color:var(--green);
  padding:1px 6px;border-radius:4px;margin-left:4px}

/* ── Index row ── */
.idx-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.idx-price{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.idx-chg{font-size:12px;font-weight:600;margin-top:3px}

/* ── Stocks tab ── */
.breadth-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.breadth-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;text-align:center}
.breadth-val{font-size:20px;font-weight:800}
.breadth-lbl{font-size:11px;color:#555;margin-top:2px;font-weight:600;letter-spacing:.04em}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;font-size:14px}
#search{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px 10px 36px;font-size:13px;color:#fff;outline:none}
.pills{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:#666;transition:all .15s}
.pill.active{border-color:var(--green);background:rgba(0,230,118,.12);color:var(--green)}
.stocks-list{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.stock-row{display:flex;align-items:center;padding:11px 14px;
  border-bottom:1px solid #222;gap:10px}
.stock-row:last-child{border-bottom:none}
.stock-ticker{font-size:13px;font-weight:700}
.stock-name{font-size:11px;color:#555;margin-top:2px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:120px}
.stock-price{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.stock-chg{font-size:11px;font-weight:600;text-align:right;margin-top:2px}

/* ── Signals tab ── */
.sig-card{background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:12px}
.sig-card:last-child{margin-bottom:0}
.sig-card-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 10px;border-bottom:1px solid #222}
.sig-type{padding:3px 12px;border-radius:20px;font-size:12px;font-weight:800;
  letter-spacing:.06em;border:1px solid}
.sig-pattern{font-size:12px;color:#aaa}
.sig-ts{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;text-align:right}
.sig-ts2{font-size:10px;color:#555;text-align:right}
.sig-price-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid #222}
.sig-entry-lbl{font-size:10px;color:#555;font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.sig-entry-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.result-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.lvl-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#222}
.lvl-cell{background:#141414;padding:8px 14px}
.lvl-name{font-size:10px;color:#555;font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.lvl-row{display:flex;align-items:baseline;gap:6px}
.lvl-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.lvl-pts{font-size:10px;font-weight:600}
.bank-align{display:flex;align-items:center;justify-content:space-between;padding:9px 14px}
.bank-lbl{font-size:11px;color:#555;font-weight:600}
.bank-val{font-size:11px;font-weight:700}

/* ── Settings tab ── */
.sec-hdr{display:flex;align-items:center;gap:8px;padding-left:2px;margin:14px 0 8px}
.sec-hdr:first-child{margin-top:0}
.sec-hdr-ico{font-size:14px}
.sec-hdr-txt{font-size:13px;font-weight:700;color:#666;letter-spacing:.06em;text-transform:uppercase}
.field-lbl{font-size:11px;color:#555;font-weight:600;letter-spacing:.04em;margin-bottom:6px}
.field-input{width:100%;background:#111;border:1px solid var(--border);border-radius:8px;
  padding:9px 36px 9px 12px;font-size:13px;color:#fff;outline:none}
.field-wrap{position:relative}
.field-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:14px;color:#555}
.divider{height:1px;background:#222;margin:10px 0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.toggle-lbl{font-size:13px;font-weight:600;color:#ddd}
.toggle-sub{font-size:11px;color:#555;margin-top:2px}
.toggle{width:46px;height:26px;border-radius:13px;border:none;cursor:pointer;
  position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:left .2s}
.info-row{display:flex;align-items:center;justify-content:space-between}
.info-lbl{font-size:13px;color:var(--muted)}
.info-val{font-size:13px;font-weight:700}
.lvl-edit-row{display:flex;align-items:center;gap:8px}
.lvl-edit-input{background:#111;border:1px solid var(--border);border-radius:7px;
  padding:7px 10px;font-size:12px;color:#ccc;outline:none}
.lvl-edit-num{width:80px;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:#fff}
.lvl-del{width:28px;height:28px;border-radius:7px;background:rgba(255,51,85,.12);
  border:1px solid rgba(255,51,85,.2);color:var(--red);font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-lvl{width:100%;margin-top:12px;padding:8px;background:transparent;
  border:1px dashed var(--border);border-radius:8px;font-size:12px;font-weight:600;
  color:#555;cursor:pointer;letter-spacing:.04em}
.save-btn{width:100%;padding:14px;background:rgba(0,230,118,.15);
  border:1.5px solid var(--green);border-radius:12px;font-size:14px;font-weight:700;
  color:var(--green);cursor:pointer;letter-spacing:.04em;transition:all .2s;margin-top:4px}
.save-btn:active{background:rgba(0,230,118,.25)}
</style>
</head>

function walk(base,n,v=.003){
  let pts=[base]
  for(let i=1;i<n;i++) pts.push(+(pts[i-1]+pts[i-1]*v*(Math.random()-.48)).toFixed(2))
  return pts
}
function sparkSVG(data,w,h,pos){
  if(!data||data.length<2)return''
  const mn=Math.min(...data),mx=Math.max(...data),range=mx-mn||1
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-(v-mn)/range*h).toFixed(1)}`).join(' ')
  const c=pos?'#00e676':'#ff3355'
  const last=pts.split(' ').pop().split(',')
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${c}"/></svg>`
}

// ── Clock ────────────────────────────────────────────────────────────────────
function updateClock(){

}

// ── Live tick ────────────────────────────────────────────────────────────────
function tick(p,v=.0004){return +(p+p*v*(Math.random()-.48)).toFixed(2)}
setInterval(()=>{
  niftyPrice=tick(niftyPrice)
  bankPrice=tick(bankPrice,.0005)
  sensexPrice=tick(sensexPrice,.0003)
  niftySpark=[...niftySpark.slice(1),niftyPrice]
  bankSpark=[...bankSpark.slice(1),bankPrice]
  sensexSpark=[...sensexSpark.slice(1),sensexPrice]
  if(activeTab==='nifty') renderNifty()
},3000)

// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(t){
  activeTab=t
  const tabs=['nifty','stocks','signals','settings']
  tabs.forEach(id=>{
    const btn=document.getElementById('nav-'+id)
    const active=id===t
    btn.style.color=active?'#fff':'#444'
    btn.querySelector('.nav-lbl').style.color=active?'#00e676':'#444'
  })
  document.getElementById('scroll').scrollTop=0
  if(t==='nifty')    renderNifty()
  else if(t==='stocks')  renderStocks()
  else if(t==='signals') renderSignals()
  else if(t==='settings')renderSettings()
}

function badge(status){
  const pos=status==='Positive'
  return `<span class="badge ${pos?'pos':'neg'}">${pos?'▲':'▼'} ${status}</span>`
}
function miniCell(label,status,spark,rev=false){

  return `<div class="mini-cell">
    <div class="mini-lbl">${label}</div>
    <div class="mini-row">${badge(status)}${sparkSVG(spark,44,22,rev?!pos:pos)}</div>
  </div>`
}
function emaRow(label,value,angle){
  return `<div class="inner-row">
    <span class="inner-lbl">${label}</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="inner-val">${fmt(value)}</span>
      <span class="angle-tag">${angle}° ↑</span>
    </div>
  </div>`
}
function lvlRow(label,value,dist,color,near){
  return `<div class="inner-row">
    <span class="inner-lbl">${label}</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="inner-val">${value.toLocaleString('en-IN')}</span>

function renderStocks(){
  const gainers=STOCKS.filter(s=>s.c>=0).length
  const losers=STOCKS.length-gainers
  document.getElementById('scroll').innerHTML=`
  <div class="breadth-grid">
    <div class="breadth-chip"><div class="breadth-val" style="color:#888">${STOCKS.length}</div><div class="breadth-lbl">Total</div></div>
    <div class="breadth-chip"><div class="breadth-val" style="color:#00e676">${gainers}</div><div class="breadth-lbl">Gainers</div></div>
    <div class="breadth-chip"><div class="breadth-val" style="color:#ff3355">${losers}</div><div class="breadth-lbl">Losers</div></div>
  </div>
  <div class="search-wrap"><span>🔍</span><input id="search" placeholder="Search ticker or name…" value="${stockSearch}" oninput="onSearch(this.value)"/></div>
  <div class="pills">
    ${['All','Gainers','Losers','A→Z'].map(s=>`<button class="pill${stockSort===s?' active':''}" onclick="setSort('${s}')">${s}</button>`).join('')}
  </div>
  <div class="stocks-list">${stockRows()}</div>
  `
}
function stockRows(){
  let list=[...STOCKS]
  if(stockSearch.trim()){const q=stockSearch.toLowerCase();list=list.filter(s=>s.t.toLowerCase().includes(q)||s.n.toLowerCase().includes(q))}
  if(stockSort==='Gainers')list.sort((a,b)=>b.c-a.c)
  else if(stockSort==='Losers')list.sort((a,b)=>a.c-b.c)
  else if(stockSort==='A→Z')list.sort((a,b)=>a.t.localeCompare(b.t))
  if(!list.length)return`<div style="padding:24px;text-align:center;color:#555;font-size:13px">No results for "${stockSearch}"</div>`
  return list.map((s,i)=>{
    const pos=s.c>=0, col=pos?'#00e676':'#ff3355'
    const sp=walk(s.p,20)
    return `<div class="stock-row">
      <div style="flex:1;min-width:0"><div class="stock-ticker">${s.t}</div><div class="stock-name">${s.n}</div></div>
      ${sparkSVG(sp,48,22,pos)}
      <div><div class="stock-price">${fmtS(s.p)}</div><div class="stock-chg" style="color:${col}">${pos?'+':''}${s.c.toFixed(2)}%</div></div>
    </div>`
  }).join('')
}
function onSearch(v){stockSearch=v; document.querySelector('.stocks-list').innerHTML=stockRows()}
function setSort(s){
  stockSort=s
  document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('active',b.textContent===s))
  document.querySelector('.stocks-list').innerHTML=stockRows()
}

function renderSignals(){

  const losses=SIGNALS.filter(s=>s.result==='Stopped Out').length

    <div class="breadth-chip"><div class="breadth-val" style="color:#ff3355">${losses}</div><div class="breadth-lbl">Losses</div></div>
  </div>
  ${SIGNALS.map(sigCard).join('')}
  `
}
function sigCard(s){
  const buy=s.type==='BUY',tc=buy?'#00e676':'#ff3355',tbg=buy?'rgba(0,230,118,.08)':'rgba(255,51,85,.08)'
  const RESULTS={Active:{c:'#00e676',bg:'rgba(0,230,118,.12)'},'Target Hit':{c:'#00e676',bg:'rgba(0,230,118,.12)'},'Stopped Out':{c:'#ff3355',bg:'rgba(255,51,85,.12)'}}
  const r=RESULTS[s.result]||{c:'#888',bg:'rgba(136,136,136,.1)'}
  return `<div class="sig-card" style="border-left:3px solid ${tc}">
    <div class="sig-card-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="sig-type" style="color:${tc};background:${tbg};border-color:${tc}">${s.type}</span>
        <span class="sig-pattern">${s.pattern}</span>
      </div>
      <div><div class="sig-ts">${s.ts}</div><div class="sig-ts2">${s.date}</div></div>
    </div>
    <div class="sig-price-row">
      <div><div class="sig-entry-lbl">ENTRY PRICE</div><div class="sig-entry-val">${s.price.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div>
      <span class="result-badge" style="color:${r.c};background:${r.bg}">${s.result}</span>
    </div>
    <div class="lvl-grid">
      ${lvlCell('Support',s.sup,s.sdist,'#00e676')}
      ${lvlCell('Resistance',s.res,s.rdist,'#ff3355')}
      ${lvlCell('SSL',s.ssl,s.ssldist,'#00e676')}
      ${lvlCell('BSL',s.bsl,s.bsldist,'#ff3355')}
    </div>
    <div class="bank-align">
      <span class="bank-lbl">Bank Nifty Aligned</span>
      <span class="bank-val" style="color:${s.aligned?'#00e676':'#ff3355'}">${s.aligned?'✓ Yes':'✗ No'}</span>
    </div>
  </div>`
}
function lvlCell(name,value,dist,color){
  return `<div class="lvl-cell">
    <div class="lvl-name">${name.toUpperCase()}</div>
    <div class="lvl-row"><span class="lvl-val">${value.toLocaleString('en-IN')}</span><span class="lvl-pts" style="color:${color}">${dist}pts</span></div>
  </div>`
}

function fieldRow(label,ph,secret,id){
  return `<div><div class="field-lbl">${label.toUpperCase()}</div>
  <div class="field-wrap">
    <input class="field-input" type="${secret?'password':'text'}" placeholder="${ph}" id="field-${id}"/>
    ${secret?`<button class="field-eye" onclick="toggleEye('field-${id}',this)">👁</button>`:''}
  </div></div>`
}
function toggleEye(id,btn){
  const el=document.getElementById(id)
  if(el.type==='password'){el.type='text';btn.textContent='🙈'}
  else{el.type='password';btn.textContent='👁'}
}
function toggleRow(label,sub,key){
  const on=toggles[key]
  return `<div class="toggle-row">
    <div><div class="toggle-lbl">${label}</div><div class="toggle-sub">${sub}</div></div>
    <button class="toggle" onclick="flipToggle('${key}',this)" style="background:${on?'#00e676':'#2a2a2a'}">
      <span class="toggle-thumb" style="left:${on?23:3}px"></span>
    </button>
  </div>`
}
function flipToggle(key,btn){
  toggles[key]=!toggles[key]
  const on=toggles[key]
  btn.style.background=on?'#00e676':'#2a2a2a'
  btn.querySelector('.toggle-thumb').style.left=(on?23:3)+'px'
}
function infoRow(label,value){
  return `<div class="info-row"><span class="info-lbl">${label}</span><span class="info-val">${value}</span></div>`
}
function lvlEdit(l,group){
  return `<div class="lvl-edit-row" id="lvl-${group}-${l.id}">
    <input class="lvl-edit-input" style="flex:1" value="${l.l}" onchange="updateLevel('${group}',${l.id},'l',this.value)"/>
    <input class="lvl-edit-input lvl-edit-num" value="${l.v}" placeholder="24200" onchange="updateLevel('${group}',${l.id},'v',this.value)"/>
    <button class="lvl-del" onclick="removeLevel('${group}',${l.id})">×</button>
  </div>`
}
function addLevel(group){
  const id=++nextId,l={id,l:'New Level',v:''}
  if(group==='nifty') niftyLvls.push(l); else bankLvls.push(l)
  renderSettings()
}
function removeLevel(group,id){
  if(group==='nifty') niftyLvls=niftyLvls.filter(l=>l.id!==id)
  else bankLvls=bankLvls.filter(l=>l.id!==id)
  renderSettings()
}
function updateLevel(group,id,field,val){
  const arr=group==='nifty'?niftyLvls:bankLvls
  const l=arr.find(x=>x.id===id); if(l) l[field]=val
}
function saveSettings(){
  const btn=document.querySelector('.save-btn')
  btn.textContent='✓ Saved!'
  btn.style.background='rgba(0,230,118,.25)'
  setTimeout(()=>{btn.textContent='Save Settings';btn.style.background='rgba(0,230,118,.15)'},2000)
}
