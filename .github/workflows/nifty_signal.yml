name: Nifty 50 Strategy Signal

on:
  # Runs every 5 minutes Mon–Fri 9:15 AM – 3:30 PM IST
  # IST = UTC+5:30  →  9:15 IST = 3:45 UTC  |  15:30 IST = 10:00 UTC
  schedule:
    - cron: '45,50,55 3 * * 1-5'                              # 9:15–9:55 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 4 * * 1-5'    # 10:00–10:55 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 5 * * 1-5'    # 11:00–11:55 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 6 * * 1-5'    # 12:00–12:55 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 7 * * 1-5'    # 13:00–13:55 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 8 * * 1-5'    # 14:00–14:55 IST
    - cron: '0,5,10,15,20,25,30 9 * * 1-5'                   # 15:00–15:30 IST
  workflow_dispatch:   # manual trigger for testing

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      contents: write   # to commit live-data.json and signals.json

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pip install requests yfinance

      # ── 4. Run strategy ──────────────────────────────────────────────────────
      - name: Run Nifty Strategy
        env:
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          FCM_SERVER_KEY:    ${{ secrets.FCM_SERVER_KEY }}
          FCM_DEVICE_TOKEN:  ${{ secrets.FCM_DEVICE_TOKEN }}
          NIFTY_LEVELS:      ${{ secrets.NIFTY_LEVELS }}
        run: python strategy/nifty_strategy.py

      # ── 5. Commit updated data files ─────────────────────────────────────────
      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f live-data.json signals.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: market data update [skip ci]"
            git push
          fi
